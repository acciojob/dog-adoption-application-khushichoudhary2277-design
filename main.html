<!DOCTYPE html>

<html><!DOCTYPE html>
<html>
<head>
    <title>Dog Adoption Application</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        form{
            width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="checkbox"]{
            width: auto;
        }

        input[type="submit"]{
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <form>

        <h1>Dog Adoption Application</h1>

        <!-- Name -->
        <label for="name">Name</label>
        <input 
            type="text" 
            id="name" 
            placeholder="Name">

        <!-- Phone Number -->
        <label for="phone">Phone Number</label>
        <input 
            type="text" 
            id="phone" 
            placeholder="Phone Number">

        <!-- Address -->
        <label for="address">Address</label>
        <input 
            type="text" 
            id="address" 
            placeholder="Address">

        <!-- Checkbox -->
        <label for="checkbox">
            Have you ever lived with a Dog before?
        </label>

        <input 
            type="checkbox" 
            id="checkbox"
            value="Have you ever lived with a Dog before?">

        <br><br>

        <!-- Multi Select -->
        <label for="multiSelect">
            Please select your preferred breeds
        </label>

        <select id="multiSelect" multiple>
            <option>Labrador</option>
            <option>Golden Retriever</option>
            <option>German Shepherd</option>
        </select>

        <!-- Submit -->
        <input 
            type="submit" 
            id="submit"
            value="Submit">

    </form>

</body>
</html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
